<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/headbar_sidebar.css">
    <link rel="stylesheet" href="./boardstyle.css">

    <script src="./boardscript.js" defer></script>

</head>
<body onload="initBoard()">
    <div class="upper-container">
    <nav>
      <img class="sidebar-logo" src="../assets/img/logo/join_logo_vector.svg">
      <div class="sidebar-content">
        <div class="sidebar-links-container">
          <a class="sidebar-links" href="#">
            <img src="../assets/svg/icons_page/summary.svg">
            Add Task
          </a>
          <a class="sidebar-links" href="#">
            <img src="../assets/svg/icons_page/summary.svg">
            Summary
          </a>
          <a class="sidebar-links" href="#">
            <img src="../assets/svg/icons_page/board.svg">
            Board
          </a>
          <a class="sidebar-links" href="#">
            <img src="../assets/svg/icons_page/contacts.svg">
            Contacts
          </a>
        </div>
        <div class="sidebar-bottom">
          <a href="#">Privacy Policy</a>
          <a href="#">Legal notice</a>
        </div>
      </div>
    </nav>
    <div class="center-wrap">
      <header class="header-template">
          <h2>Kanban Project Management Tool</h2>
          <div class="profile-section">
            <button class="help-icon"><img src="../assets/svg/help_small.svg"></button>
            <button class="profile" id="profilePicture" onclick="dropDown(event)">SM</button>
          </div>
      </header>
      <div class="dropdown-menu-container" id="dropDownMenu">
        <div class="dropdown-menu">
          <button>Legal Notice</button>
          <button>Privacy Policy</button>
          <button>Log out</button>
        </div>
      </div>

      <section>
        <div class="dpf_at sp_between borderHeadline">
            <h1>Borad</h1>
            <div class="dpf_cc gap32">
                <input class="inputSearch" type="text" placeholder="Find Task">
                <button class="addTaskButoon">Add task
                    <img src="../assets/svg/add.svg" alt="">
                </button>
            </div>
        </div>

        <section class="dpf gap26 border">
            <div>
                <div class="dpf_at sp_between singleDragContainerHeader">
                    <h3>To do</h3>
                    <button class="addTask">
                        <img src="../assets/svg/add.svg" alt="">
                    </button>
                </div>
                <div class="singleDragContainer dpf_at gap16 flex_col" id="todo"  ondrop="moveTo('todo')" ondragover="dragoverHandler(event)"></div>  
            </div>


            <div>    
                <div class="dpf_at sp_between singleDragContainerHeader">
                    <h3>In progress</h3>
                    <button class="addTask">
                        <img src="../assets/svg/add.svg" alt="">
                    </button>
                </div>
                <div class="singleDragContainer dpf_at gap16 flex_col" id="inProgress" ondrop="moveTo('inprogress')" ondragover="dragoverHandler(event)"></div>
            </div>

            <div> 
                <div class="dpf_at sp_between singleDragContainerHeader">
                    <h3>Await feedback</h3>
                    <button class="addTask">
                        <img src="../assets/svg/add.svg" alt="">
                    </button>
                </div>
                <div class="singleDragContainer dpf_at gap16 flex_col" id="awaitFeedback"ondrop="moveTo('awaitfeedback')" ondragover="dragoverHandler(event)"></div>
            </div>
            
            <div>
                <div class="dpf_at sp_between singleDragContainerHeader">
                    <h3>Done</h3>
                </div>
                <div class="singleDragContainer dpf_at gap16 flex_col" id="done"ondrop="moveTo('done')" ondragover="dragoverHandler(event)"></div>


                </div>
            </div>

            
        </section>

      </section>
    
</body>
</html>
